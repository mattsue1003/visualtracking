<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>阿彌陀籤 - 專業認知訓練版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-dark: #020617;
            --path-color: #f43f5e;
            --accent-indigo: #6366f1;
            --accent-emerald: #10b981;
        }

        body {
            background-color: var(--bg-dark);
            color: #f8fafc;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* 設定面板轉場 */
        .settings-container {
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s;
        }

        .settings-collapsed {
            transform: translateY(-94%);
        }

        #mainContent {
            transition: padding-top 0.5s ease;
        }

        canvas {
            display: block;
            touch-action: none;
            filter: drop-shadow(0 0 15px rgba(99, 102, 241, 0.2));
        }

        /* 隱藏 YouTube 播放器但保持運作 */
        #youtubePlayerContainer {
            position: absolute;
            width: 1px;
            height: 1px;
            overflow: hidden;
            left: -100px;
        }

        input[type="range"] {
            cursor: pointer;
        }

        /* 標籤發光效果 */
        .label-glow {
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
        }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="flex flex-col">

    <!-- YouTube 隱藏播放器 -->
    <div id="youtubePlayerContainer">
        <div id="player"></div>
    </div>

    <!-- 設定面板 -->
    <div id="settingsPanel" class="settings-container fixed top-0 left-0 w-full z-50 p-2 md:p-4">
        <div class="max-w-6xl mx-auto bg-slate-900/95 backdrop-blur-2xl p-4 md:p-6 rounded-3xl shadow-2xl border border-white/10">
            <div class="grid grid-cols-1 md:grid-cols-12 gap-4 items-center">
                
                <!-- 標題與設計者 -->
                <div class="md:col-span-3 text-center md:text-left">
                    <h1 class="text-xl md:text-2xl font-black bg-gradient-to-r from-indigo-400 to-emerald-400 bg-clip-text text-transparent">視覺追蹤訓練</h1>
                    <p class="text-[10px] text-slate-400 font-bold mt-1">設計者：愛迪樂 鍾孟修 職能治療師</p>
                </div>

                <!-- 遊戲控制 -->
                <div class="md:col-span-4 grid grid-cols-2 gap-3">
                    <div class="bg-slate-950/50 p-2 px-3 rounded-2xl border border-white/5 flex items-center justify-between">
                        <span class="text-[10px] font-bold text-slate-500 uppercase">線條</span>
                        <div class="flex items-center space-x-2">
                            <button onclick="changeLineCount(-1)" class="w-7 h-7 hover:bg-indigo-500/20 rounded-full text-indigo-400">－</button>
                            <span id="lineCountDisplay" class="text-lg font-black text-white w-5 text-center">4</span>
                            <button onclick="changeLineCount(1)" class="w-7 h-7 hover:bg-indigo-500/20 rounded-full text-indigo-400">＋</button>
                        </div>
                    </div>
                    <div class="bg-slate-950/50 p-2 px-3 rounded-2xl border border-white/5 flex items-center space-x-2">
                        <span class="text-[10px] font-bold text-slate-500 uppercase">速度</span>
                        <input type="range" id="speedSlider" min="2" max="25" value="12" class="w-full h-1.5 bg-slate-700 rounded-lg appearance-none accent-rose-500">
                    </div>
                </div>

                <!-- 音量控制 -->
                <div class="md:col-span-3 grid grid-cols-2 gap-3">
                    <div class="bg-slate-950/50 p-2 px-3 rounded-2xl border border-white/5 flex flex-col justify-center">
                        <span class="text-[9px] font-bold text-slate-500 uppercase mb-1">音效音量</span>
                        <input type="range" id="sfxVolume" min="0" max="100" value="70" class="w-full h-1 bg-slate-700 rounded-lg appearance-none accent-indigo-400">
                    </div>
                    <div class="bg-slate-950/50 p-2 px-3 rounded-2xl border border-white/5 flex flex-col justify-center">
                        <span class="text-[9px] font-bold text-slate-500 uppercase mb-1">背景音樂</span>
                        <input type="range" id="bgmVolume" min="0" max="100" value="50" oninput="updateMusicVolume(this.value)" class="w-full h-1 bg-slate-700 rounded-lg appearance-none accent-emerald-400">
                    </div>
                </div>

                <!-- 按鈕組 -->
                <div class="md:col-span-2 flex gap-2">
                    <button onclick="initGame()" class="flex-grow py-3 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl font-bold transition-all active:scale-95 text-sm shadow-lg shadow-indigo-500/20">
                        重生
                    </button>
                    <button onclick="toggleFullscreen()" class="px-3 bg-slate-800 hover:bg-slate-700 text-white rounded-xl border border-white/10 transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4" />
                        </svg>
                    </button>
                </div>
            </div>
            
            <button onclick="toggleSettings()" class="absolute -bottom-10 left-1/2 -translate-x-1/2 bg-slate-800 border border-white/10 px-8 py-1 rounded-b-2xl text-[10px] font-black text-slate-400 hover:text-white transition-colors tracking-widest">
                MENU (TAB)
            </button>
        </div>
    </div>

    <!-- 遊戲區域 -->
    <main id="mainContent" class="flex-grow flex flex-col items-center justify-center pt-32 pb-6 overflow-hidden">
        <div id="gameWrapper" class="relative w-full h-full max-w-[1600px] flex flex-col px-4">
            
            <!-- 頂部起點 -->
            <div id="labelsTop" class="grid w-full h-20 items-center"></div>
            
            <!-- 畫布區域 -->
            <div id="canvasContainer" class="relative flex-grow w-full flex items-center justify-center">
                <canvas id="kujiCanvas"></canvas>
            </div>
            
            <!-- 底部終點 -->
            <div id="labelsBottom" class="grid w-full h-20 items-center"></div>
        </div>
    </main>

    <!-- 狀態顯示 -->
    <div id="statusToast" class="fixed bottom-12 left-1/2 -translate-x-1/2 bg-indigo-600 text-white px-10 py-4 rounded-3xl shadow-2xl opacity-0 transition-all transform translate-y-10 pointer-events-none text-xl font-black z-[100] border-2 border-white/20">
        READY
    </div>

    <script>
        // --- YouTube API ---
        let player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '0',
                width: '0',
                videoId: 'JqzXnqdmgs8',
                playerVars: {
                    'autoplay': 1,
                    'loop': 1,
                    'playlist': 'JqzXnqdmgs8',
                    'controls': 0,
                    'showinfo': 0,
                    'rel': 0
                },
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        function onPlayerReady(event) {
            event.target.setVolume(document.getElementById('bgmVolume').value);
            event.target.playVideo();
        }

        function updateMusicVolume(val) {
            if (player && player.setVolume) {
                player.setVolume(val);
            }
        }

        // 載入 YouTube SDK
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        // --- 音效合成器 (Web Audio API) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, type, duration, volumeMult = 1) {
            const masterVol = document.getElementById('sfxVolume').value / 100;
            if (masterVol <= 0) return;

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            gain.gain.setValueAtTime(0.1 * masterVol * volumeMult, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        const sfx = {
            click: () => playTone(600, 'sine', 0.1),
            step: () => playTone(300, 'triangle', 0.05, 0.5),
            success: () => {
                playTone(523.25, 'sine', 0.2); // C5
                setTimeout(() => playTone(659.25, 'sine', 0.2), 100); // E5
                setTimeout(() => playTone(783.99, 'sine', 0.4), 200); // G5
            }
        };

        // --- 核心遊戲邏輯 ---
        const canvas = document.getElementById('kujiCanvas');
        const ctx = canvas.getContext('2d');
        const speedSlider = document.getElementById('speedSlider');
        const statusToast = document.getElementById('statusToast');
        const settingsPanel = document.getElementById('settingsPanel');
        const mainContent = document.getElementById('mainContent');
        
        let lineCount = 4;
        let horizontalRungs = [];
        let isAnimating = false;
        let isSettingsCollapsed = false;

        function toggleSettings() {
            isSettingsCollapsed = !isSettingsCollapsed;
            if (isSettingsCollapsed) {
                settingsPanel.classList.add('settings-collapsed');
                mainContent.style.paddingTop = '2rem';
            } else {
                settingsPanel.classList.remove('settings-collapsed');
                mainContent.style.paddingTop = '8rem';
            }
            setTimeout(initGame, 550);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
            }
            setTimeout(initGame, 500);
        }

        function initGame() {
            if (isAnimating) return;
            const container = document.getElementById('canvasContainer');
            const rect = container.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            canvas.style.width = `${rect.width}px`;
            canvas.style.height = `${rect.height}px`;
            ctx.scale(dpr, dpr);

            generateRungs();
            createLabels();
            drawBoard();
        }

        function generateRungs() {
            horizontalRungs = [];
            const rungCount = Math.floor(lineCount * 3.5);
            for (let i = 0; i < rungCount; i++) {
                const startLine = Math.floor(Math.random() * (lineCount - 1));
                const y = Math.random() * 0.8 + 0.1;
                const overlap = horizontalRungs.some(r => r.line === startLine && Math.abs(r.y - y) < 0.08);
                if (!overlap) horizontalRungs.push({ line: startLine, y: y });
            }
            horizontalRungs.sort((a, b) => a.y - b.y);
        }

        function getLineX(index) {
            const containerWidth = canvas.width / (window.devicePixelRatio || 1);
            return (containerWidth / lineCount) * (index + 0.5);
        }

        function drawBoard() {
            const w = canvas.width / (window.devicePixelRatio || 1);
            const h = canvas.height / (window.devicePixelRatio || 1);
            ctx.clearRect(0, 0, w, h);
            ctx.lineCap = 'round';
            
            for (let i = 0; i < lineCount; i++) {
                const x = getLineX(i);
                ctx.beginPath();
                ctx.strokeStyle = '#0f172a';
                ctx.lineWidth = 14;
                ctx.moveTo(x, 0); ctx.lineTo(x, h);
                ctx.stroke();

                ctx.beginPath();
                ctx.strokeStyle = '#334155';
                ctx.lineWidth = 5;
                ctx.moveTo(x, 0); ctx.lineTo(x, h);
                ctx.stroke();
            }
            
            ctx.lineWidth = 5;
            ctx.strokeStyle = '#334155';
            horizontalRungs.forEach(rung => {
                const x1 = getLineX(rung.line);
                const x2 = getLineX(rung.line + 1);
                const y = rung.y * h;
                ctx.beginPath();
                ctx.moveTo(x1, y); ctx.lineTo(x2, y);
                ctx.stroke();
            });
        }

        function createLabels() {
            const top = document.getElementById('labelsTop');
            const bottom = document.getElementById('labelsBottom');
            const gridStyle = `grid-template-columns: repeat(${lineCount}, 1fr)`;
            top.style = gridStyle; bottom.style = gridStyle;
            top.innerHTML = ''; bottom.innerHTML = '';
            
            for (let i = 0; i < lineCount; i++) {
                // 頂部按鈕
                const wrapperT = document.createElement('div');
                wrapperT.className = "flex justify-center items-center";
                const btn = document.createElement('button');
                btn.className = `w-14 h-14 md:w-16 md:h-16 rounded-2xl bg-slate-900 border-2 border-indigo-500 text-indigo-400 font-black text-2xl hover:bg-indigo-600 hover:text-white transition-all label-glow active:scale-90`;
                btn.innerText = String.fromCharCode(65 + i);
                btn.onclick = () => {
                    sfx.click();
                    if (!isSettingsCollapsed) toggleSettings();
                    startTrace(i);
                };
                wrapperT.appendChild(btn);
                top.appendChild(wrapperT);
                
                // 底部按鈕 (現在一樣亮眼)
                const wrapperB = document.createElement('div');
                wrapperB.className = "flex justify-center items-center";
                const target = document.createElement('div');
                target.className = "w-14 h-14 md:w-16 md:h-16 flex items-center justify-center font-black text-2xl text-emerald-400 bg-slate-900 border-2 border-emerald-500/50 rounded-2xl label-glow";
                target.innerText = (i + 1).toString();
                wrapperB.appendChild(target);
                bottom.appendChild(wrapperB);
            }
        }

        async function startTrace(startIndex) {
            if (isAnimating) return;
            isAnimating = true;
            showToast("請眼睛緊跟紅點...");
            
            const h = canvas.height / (window.devicePixelRatio || 1);
            let currentLine = startIndex;
            let pathPoints = [{x: getLineX(currentLine), y: 0}];
            
            for (let rung of horizontalRungs) {
                if (rung.line === currentLine) {
                    pathPoints.push({x: getLineX(currentLine), y: rung.y * h});
                    currentLine++;
                    pathPoints.push({x: getLineX(currentLine), y: rung.y * h});
                } else if (rung.line === currentLine - 1) {
                    pathPoints.push({x: getLineX(currentLine), y: rung.y * h});
                    currentLine--;
                    pathPoints.push({x: getLineX(currentLine), y: rung.y * h});
                }
            }
            pathPoints.push({x: getLineX(currentLine), y: h});
            await animatePath(pathPoints);
            
            isAnimating = false;
            sfx.success();
            showToast(`到達：${currentLine + 1} 號！`, true);
            setTimeout(() => { if (isSettingsCollapsed) toggleSettings(); }, 2500);
        }

        async function animatePath(points) {
            const speed = parseInt(speedSlider.value);
            for (let i = 0; i < points.length - 1; i++) {
                const start = points[i];
                const end = points[i + 1];
                const dist = Math.sqrt(Math.pow(end.x - start.x, 2) + Math.pow(end.y - start.y, 2));
                const steps = Math.max(1, Math.floor(dist / (speed * 1.2)));
                
                // 每次轉向發出微弱音效
                if (i > 0) sfx.step();

                for (let s = 0; s <= steps; s++) {
                    const p = s / steps;
                    const curX = start.x + (end.x - start.x) * p;
                    const curY = start.y + (end.y - start.y) * p;
                    
                    drawBoard();
                    ctx.shadowBlur = 20; ctx.shadowColor = '#f43f5e';
                    ctx.strokeStyle = '#f43f5e'; ctx.lineWidth = 10;
                    ctx.beginPath();
                    ctx.moveTo(points[0].x, points[0].y);
                    for(let j=0; j<i; j++) ctx.lineTo(points[j+1].x, points[j+1].y);
                    ctx.lineTo(curX, curY); ctx.stroke();
                    
                    ctx.shadowBlur = 25; ctx.fillStyle = '#ffffff';
                    ctx.beginPath(); ctx.arc(curX, curY, 12, 0, Math.PI * 2); ctx.fill();
                    ctx.shadowBlur = 0;
                    await new Promise(r => requestAnimationFrame(r));
                }
            }
        }

        function changeLineCount(delta) {
            if (isAnimating) return;
            const next = lineCount + delta;
            if (next >= 2 && next <= 12) {
                lineCount = next;
                document.getElementById('lineCountDisplay').innerText = lineCount;
                sfx.click();
                initGame();
            }
        }

        function showToast(msg, isLong = false) {
            statusToast.innerText = msg;
            statusToast.style.opacity = '1';
            statusToast.style.transform = 'translate(-50%, 0)';
            setTimeout(() => {
                statusToast.style.opacity = '0';
                statusToast.style.transform = 'translate(-50%, 2rem)';
            }, isLong ? 3500 : 2000);
        }

        window.addEventListener('keydown', (e) => { if (e.key === 'Tab') { e.preventDefault(); toggleSettings(); } });
        window.onresize = () => setTimeout(initGame, 200);
        window.onload = initGame;
    </script>
</body>
</html>
